\* Configuration: disconnect-on-advance strategy
\* FIX_RECORD=FALSE, FIX_REPROMPT=FALSE
\* But AdvanceWhileConnected is removed from Next (see .tla variant)
\* This tests whether the safe path alone satisfies all properties.
\* Since we can't remove an action from cfg, we test FIX_RECORD=TRUE
\* to approximate (the disconnect means upsert path is never exercised
\* during advance, but BackendConsistency still requires DB agreement)

\* For now: test record-only fix to isolate
CONSTANTS
    MAX_Q = 4
    FIX_RECORD = FALSE
    FIX_REPROMPT = TRUE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    ErrorConsistency
    BackendConsistency
    NoLLMSilenceAfterAdvance
    NoSilentDesync
    UINotBehindAdvance
    BackendRecordSync

PROPERTIES
    MonotonicProgress
    LLMEventualResponse
    BackendEventualSync
